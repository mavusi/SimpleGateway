<div class="bg-white p-4 rounded shadow">
  <form {{hx}} hx-target="#main" hx-swap="innerHTML">
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <div>
        <label class="block text-sm font-medium text-gray-700">Id</label>
        <input name="id" class="mt-1 block w-full border-gray-300 rounded-md" value="{{id}}" {{readonly}} />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Service</label>
        <select name="serviceId" class="mt-1 block w-full border-gray-300 rounded-md">
          {{serviceOptions}}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Path</label>
        <input name="path" class="mt-1 block w-full border-gray-300 rounded-md" value="{{path}}" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Method</label>
        <input name="method" class="mt-1 block w-full border-gray-300 rounded-md" value="{{method}}" />
      </div>
    </div>
    <div class="mt-4 flex items-center space-x-2">
      <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Save</button>
      <button type="button" class="px-4 py-2 border rounded" hx-get="/admin/partials/endpoints/list" hx-target="#main" hx-swap="innerHTML">Cancel</button>
    </div>
  </form>
</div>
