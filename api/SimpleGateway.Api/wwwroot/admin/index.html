<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SimpleGateway Admin (SPA)</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div class="max-w-6xl mx-auto p-6" id="app">
      <header class="mb-6">
        <h1 class="text-2xl font-semibold">SimpleGateway Admin (SPA)</h1>
        <p class="text-sm text-gray-600">Manage services and endpoints</p>
      </header>

      <div class="bg-gray-50 p-4 rounded-lg shadow">
        <nav class="flex space-x-2 mb-4">
          <button id="tab-endpoints" class="px-3 py-1 rounded bg-white text-gray-900" hx-get="/admin/partials/endpoints/list" hx-target="#main" hx-swap="innerHTML" onclick="activateTab('endpoints')">Endpoints</button>
          <button id="tab-services" class="px-3 py-1 rounded text-gray-600 hover:bg-white hover:text-gray-900" hx-get="/admin/partials/services/list" hx-target="#main" hx-swap="innerHTML" onclick="activateTab('services')">Services</button>
        </nav>

        <main id="main" class="min-h-[320px]"></main>
      </div>
    </div>

    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
    <script>
      // small helper to toggle active class
      function activateTab(name){
        document.getElementById('tab-endpoints').classList.toggle('bg-white', name==='endpoints');
        document.getElementById('tab-services').classList.toggle('bg-white', name==='services');
      }
    </script>
    <script>
      // load default partial on page load
      document.addEventListener('DOMContentLoaded', function(){
        document.getElementById('main').setAttribute('hx-get', '/admin/partials/endpoints/list');
        document.getElementById('main').setAttribute('hx-trigger', 'load');
        activateTab('endpoints');
      });
    </script>
    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 space-y-2 z-50"></div>
    <script>
      function showToast(message, type = 'info'){
        const container = document.getElementById('toast-container');
        if(!container) return;
        const el = document.createElement('div');
        el.className = 'max-w-sm w-full bg-white shadow rounded border p-3';
        el.innerText = message;
        container.appendChild(el);
        setTimeout(()=>{ el.classList.add('opacity-0'); setTimeout(()=>el.remove(), 400); }, 3000);
      }

      // Listen for HTMX swaps and show messages if server set X-HTMX-Message or X-HTMX-Error
      document.body.addEventListener('htmx:afterSwap', function(evt){
        try{
          const xhr = evt.detail.xhr;
          if(!xhr) return;
          const msg = xhr.getResponseHeader('X-HTMX-Message');
          const err = xhr.getResponseHeader('X-HTMX-Error');
          if(msg) showToast(msg, 'success');
          if(err) showToast(err, 'error');
        }catch(e){ /* ignore */ }
      });

      // Optional: show global error for non-200 responses
      document.body.addEventListener('htmx:afterRequest', function(evt){
        try{
          const xhr = evt.detail.xhr;
          if(!xhr) return;
          if(xhr.status >= 400){
            const err = xhr.getResponseHeader('X-HTMX-Error') || xhr.statusText || 'Request failed';
            showToast(err, 'error');
          }
        }catch(e){ }
      });
    </script>
  </body>
</html>
