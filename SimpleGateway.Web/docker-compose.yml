services:
  web:
    image: simplegateway-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8001}
      PORT: "3000"
      NODE_ENV: production
    restart: unless-stopped
