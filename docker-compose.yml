version: '3.9'
services:
  simplegateway-api:
    build:
      context: ./api/SimpleGateway.Api
      dockerfile: Dockerfile
    image: simplegateway-api:latest
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8000;http://+:8001
