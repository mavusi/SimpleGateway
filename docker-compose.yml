services:
  api:
    build:
      context: .
      dockerfile: SimpleGateway.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION}
    ports:
      - "8000:80"
  adminapi:
    build:
      context: .
      dockerfile: SimpleGateway.AdminApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION}
    ports:
      - "8001:80"

  web:
    build:
      context: .
      dockerfile: SimpleGateway.Web/Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8001}
      ASPNETCORE_ENVIRONMENT: Docker
      API_URL: http://api:8000
      ADMIN_API_URL: http://adminapi:8001
    ports:
      - "8002:3000"
    depends_on:
      - api
      - adminapi
